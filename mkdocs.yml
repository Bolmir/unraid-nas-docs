site_name: HOMELAB NAS Dokumentation
site_description: Automatisch gepflegte Dokumentation des Unraid NAS HOMELAB
site_url: https://bolmir.github.io/unraid-nas-docs
repo_url: https://github.com/Bolmir/unraid-nas-docs
repo_name: Bolmir/unraid-nas-docs

theme:
  name: material
  language: de
  palette:
    - scheme: slate
      primary: orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Hell-Modus
    - scheme: default
      primary: orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Dunkel-Modus
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tables
    - toc.integrate

nav:
  - Home: index.md
  - Hardware:
    - Übersicht: hardware/overview.md
  - Software:
    - Plugins: software/plugins.md
    - Shares: software/shares.md
  - Dienste:
    - Docker Container: services/docker-containers.md
  - Netzwerk:
    - Übersicht: network/overview.md
  - Einrichtung:
    - Unraid Neuinstallation: setup/unraid.md
    - Docker Container Setup: setup/docker.md
    - Dienste-Konfiguration: setup/services.md
  - Sicherheit:
    - Passwörter & Bitwarden: security/passwords.md
  - Disaster Recovery:
    - Notfallplan: disaster-recovery/plan.md
  - Wartung:
    - Backup: maintenance/backup.md

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - def_list
